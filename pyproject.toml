[project]
name = "vulntriage"
version = "0.1.0"
description = "LLM-enabled vulnerability investigation and triaging system"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "pydantic>=2.13",
    "openai>=2.44",
    "pyyaml>=6.0",
]

[project.scripts]
vulntriage = "vulntriage.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vulntriage"]

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
